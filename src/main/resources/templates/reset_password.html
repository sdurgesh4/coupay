<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/reset-password" method="post">

  <input
          type="hidden"
          name="email"
          th:value="${email}">

  <input
          type="password"
          name="password"
          placeholder="New Password">

  <button>
    Reset Password
  </button>

</form>
</body>
</html>
