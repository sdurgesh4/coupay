<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="w-[350px] bg-white p-6 rounded-2xl shadow">

    <h2 class="text-xl font-bold mb-4 text-center">Register</h2>

    <form action="/register" method="post" th:object="${user}">

        <input type="text" th:field="*{username}"
               placeholder="Username"
               class="w-full p-3 border rounded mb-3" required>

        <input type="password" th:field="*{password}"
               placeholder="Password"
               class="w-full p-3 border rounded mb-3" required>

        <button class="w-full bg-blue-500 text-white p-3 rounded">
            Register
        </button>

    </form>

    <p class="text-sm text-center mt-3">
        Already have account?
        <a href="/login" class="text-blue-500">Login</a>
    </p>

</div>

</body>
</html>
