<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config={darkMode:'class'}
        if(localStorage.theme==="dark"){
            document.documentElement.classList.add("dark");
        }
    </script>

</head>

<body class="
min-h-screen
flex items-center justify-center
bg-gray-100
dark:bg-slate-950
p-6">

<div class="
w-full max-w-md
bg-white dark:bg-slate-800
rounded-3xl
shadow-xl
p-8">

    <h2 class="
text-3xl font-bold text-center mb-2
dark:text-white">
        Forgot Password
    </h2>

    <p class="
text-center text-gray-500
dark:text-slate-300
mb-6">
        Enter your registered email
    </p>


    <p
            th:if="${error}"
            class="
bg-red-100
text-red-600
rounded-xl
p-3 mb-4 text-center"
            th:text="${error}">
    </p>


    <form action="/send-otp"
          method="post"
          class="space-y-5">

        <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
                class="
w-full p-4 rounded-2xl border
focus:ring-2 focus:ring-indigo-500
dark:bg-slate-700
dark:text-white">


        <button
                class="
w-full bg-indigo-600
hover:bg-indigo-700
text-white p-4 rounded-2xl
font-semibold">
            Send OTP
        </button>

    </form>

    <div class="text-center mt-5">

        <a href="/login"
           class="text-indigo-600">
            Back to Login
        </a>

    </div>

</div>

</body>
</html>
