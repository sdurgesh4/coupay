<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h2 class="text-xl font-bold mb-4">Admin Panel</h2>
<a href="/"
   class="block bg-gray-200 p-3 rounded-xl text-center">
    Browse Coupons
</a>
<!-- Coupons -->
<div>
    <h3 class="font-bold mb-2">Coupons</h3>

    <div th:each="c : ${coupons}" class="bg-white p-3 mb-2 rounded shadow">

        <p th:text="${c.brand}"></p>

        <div class="flex gap-2 mt-2">
            <a th:href="@{/admin/delete-coupon/{id}(id=${c.id})}"
               class="bg-red-500 text-white px-3 py-1 rounded">Delete</a>

            <a th:if="${c.reported}"
               th:href="@{/admin/remove-report/{id}(id=${c.id})}"
               class="bg-yellow-500 text-white px-3 py-1 rounded">Remove Report</a>
        </div>

    </div>
</div>

<!-- Users -->
<div class="mt-5">
    <h3 class="font-bold mb-2">Users</h3>

    <div th:each="u : ${users}" class="bg-white p-3 mb-2 rounded shadow">
        <p th:text="${u.username}"></p>
    </div>
</div>

</body>
</html>
