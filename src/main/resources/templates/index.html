<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Coupon Market</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <style>
        .card:hover {
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="bg-gray-100">

<div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="bg-[#f5efe0] p-6 rounded-b-3xl">
        <h2 class="text-3xl font-bold">Coupons</h2>
        <p class="text-gray-600">Buy & Save More</p>
    </div>

    <!-- Actions -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-3 p-4">

        <form action="/search" method="get" class="w-full md:w-1/2">
            <input type="text" name="keyword"
                   placeholder="Search coupons"
                   class="w-full p-3 rounded-xl border outline-none">
        </form>

        <div class="flex justify-between items-center p-2">
            <!-- Profile Icon -->
            <a href="/profile">
                <img th:if="${session.user.profileImage != null}"
                     th:src="@{${session.user.profileImage}}"
                     class="w-10 h-10 rounded-full object-cover border">

                <img th:if="${session.user.profileImage == null}"
                     src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     class="w-10 h-10 rounded-full object-cover border">
            </a>
        </div>
    </div>
    <div class="flex gap-2 overflow-x-auto p-4">

        <a href="/" class="px-4 py-2 bg-gray-200 rounded-full text-sm">All</a>

        <a href="/category/Amazon" class="px-4 py-2 bg-blue-100 rounded-full text-sm">
            Amazon
        </a>

        <a href="/category/Flipkart" class="px-4 py-2 bg-yellow-100 rounded-full text-sm">
            Flipkart
        </a>

        <a href="/category/Food" class="px-4 py-2 bg-green-100 rounded-full text-sm">
            Food
        </a>

        <a href="/category/Travel" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Travel
        </a>

        <a href="/category/Electronics" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Electronics
        </a>

        <a href="/category/cosmetics" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            cosmetics
        </a>

        <a href="/category/Other" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Others
        </a>

    </div>
    <!-- Grid -->
    <div class="grid gap-4 p-4
                grid-cols-2
                sm:grid-cols-2
                md:grid-cols-3
                lg:grid-cols-4
                xl:grid-cols-5">

        <div th:each="c : ${coupons}"
             class="relative bg-white rounded-2xl p-4 shadow-sm hover:shadow-md active:scale-95 transition"
             th:classappend="${c.expiryDate != null and c.expiryDate.isBefore(T(java.time.LocalDate).now())} ? 'opacity-60'">

            <!-- 🔥 BADGE -->
            <span
                    class="absolute top-2 left-2 text-xs px-3 py-1 rounded-full font-medium shadow-sm"
                    th:classappend="${
                    c.expiryDate != null and c.expiryDate.isBefore(T(java.time.LocalDate).now()) ? 'bg-red-500 text-white' :
                    c.expiryDate != null and T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) <= 2 ? 'bg-yellow-400 text-black' :
                    'bg-green-500 text-white'
                }"
                    th:text="${
                    c.expiryDate == null ? '' :
                    (T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) > 0 ?
                        'Expires in ' + T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) + ' days' :
                    (T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) == 0 ?
                        'Expires today' :
                        'Expired ' + -T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) + ' days ago'
                    ))
                }">
            </span>

            <p class="text-xs text-gray-400 text-right"
               th:text="${c.category}">
            </p>
            <!-- QR -->
            <img th:src="${c.qrCodeUrl}"
                 class="h-24 mx-auto mb-3 object-contain mt-4"/>

            <!-- Brand -->
            <h3 class="font-semibold text-center"
                th:text="${c.brand}"></h3>

            <!-- Description -->
            <p class="text-sm text-gray-500 text-center"
               th:text="${c.description}"></p>

            <!-- BUTTON -->
            <a th:if="${c.expiryDate == null or !c.expiryDate.isBefore(T(java.time.LocalDate).now())}"
               th:href="@{/coupon/{id}(id=${c.id})}"
               class="btn green w-full mt-3">
                View
            </a>

            <button th:if="${c.expiryDate != null and c.expiryDate.isBefore(T(java.time.LocalDate).now())}"
                    class="btn grey w-full mt-3" disabled>
                Expired
            </button>

        </div>

    </div>

</div>

</body>
</html>
