<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Coupon Market</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111827">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

    <style>
        .card:hover {
            transform: translateY(-3px);
        }

        .line-clamp-2{
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
    </style>
    <script>
        tailwind.config={
        darkMode:'class'
        }
    </script>

    <script>
        if(localStorage.theme==="dark"){
        document.documentElement.classList.add("dark");
        }
    </script>
</head>

<body class="bg-gray-100 text-gray-900
dark:bg-gradient-to-br
dark:from-slate-950
dark:via-indigo-950
dark:to-slate-900
dark:text-white">
<div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="bg-[#f5efe0] dark:bg-slate-900 dark:border-b dark:border-slate-700
p-6 rounded-b-3xl">

        <div class="flex justify-between items-start">

            <div>
                <h2 class="text-3xl font-bold">
                    Coupons
                </h2>

                <p class="text-gray-600 mt-1">
                    Buy & Save More
                </p>
            </div>

            <!-- Profile Icon -->
            <a href="/profile" class="shrink-0">

                <img th:if="${session.user.profileImage != null}"
                     th:src="${session.user.profileImage}"
                     class="w-12 h-12 rounded-full object-cover border-2 border-white shadow">

                <img th:if="${session.user.profileImage == null}"
                     src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     class="w-12 h-12 rounded-full object-cover border-2 border-white shadow">

            </a>

        </div>

    </div>

    <!-- Actions -->
    <div class="px-4 mt-4 mb-5">

        <form action="/search" method="get">

            <div class="bg-gray-100
                    dark:bg-slate-800
                    dark:border dark:border-slate-600
                    rounded-full flex items-center
                    px-5 h-12 shadow-lg ">

                <svg
                        class="w-7 h-7 text-gray-400 mr-3"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24">

                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-4.3-4.3m1.3-5.2a6.5 6.5 0 11-13 0a6.5 6.5 0 0113 0z"/>
                </svg>

                <input
                        type="text"
                        name="keyword"
                        placeholder="Search brands and coupons"
                        style="border:none;box-shadow:none;"
                        class="w-full bg-transparent border-0 outline-none
                                dark:text-white
                                dark:placeholder-slate-400"/>
            </div>

        </form>

    </div>

    <div class="flex gap-2 overflow-x-auto p-4 text-gray-900">

        <a href="/" class="px-4 py-2 bg-gray-200 rounded-full text-sm">All</a>

        <a href="/category/Amazon" class="px-4 py-2 bg-blue-100 rounded-full text-sm">
            Amazon
        </a>

        <a href="/category/Flipkart" class="px-4 py-2 bg-yellow-100 rounded-full text-sm">
            Flipkart
        </a>

        <a href="/category/Food" class="px-4 py-2 bg-green-100 rounded-full text-sm">
            Food
        </a>

        <a href="/category/Travel" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Travel
        </a>

        <a href="/category/Electronics" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Electronics
        </a>

        <a href="/category/Cosmetics" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Cosmetics
        </a>
        <a href="/category/Fashion" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Fashion
        </a>

        <a href="/category/Other" class="px-4 py-2 bg-purple-100 rounded-full text-sm">
            Other
        </a>
    </div>

    <!-- Grid -->
    <div class="grid gap-4 p-4 grid-cols-2 sm:grid-cols-2 md:grid-cols-3
    lg:grid-cols-4 xl:grid-cols-5">

        <div th:each="c : ${coupons}"

             th:classappend="${c.expiryDate != null and c.expiryDate.isBefore(T(java.time.LocalDate).now())} ? 'opacity-70'"
             class="group">

            <a th:href="@{/coupon/{id}(id=${c.id})}"

               class="block bg-white rounded-[28px]
                overflow-hidden border border-gray-200
                shadow-sm hover:shadow-lg
                active:scale-95 transition

                dark:bg-slate-800
                border border-gray-200
                dark:border-slate-700">


                <!-- IMAGE TOP HALF -->
                <div class="relative h-40 overflow-hidden">

                    <img th:src="${c.qrCodeUrl}"
                         class="w-full h-full object-cover"/>


                    <!-- KEEP YOUR EXISTING BADGE LOGIC -->
                    <span class="absolute top-3 right-3
                        text-xs px-3 py-1 rounded-full font-medium shadow-sm"

                        th:classappend="${
                        c.expiryDate != null and c.expiryDate.isBefore(T(java.time.LocalDate).now()) ? 'bg-red-500 text-white' :
                        c.expiryDate != null and T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) <= 2 ? 'bg-yellow-300 text-black' :
                        'bg-green-100 text-green-700'
                        }"

                        th:text="${
                        c.expiryDate == null ? '' :
                        (T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate) > 0 ?
                        T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate)+'d left' :
                        (T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), c.expiryDate)==0 ?
                        'Today' :
                        'Expired'))
                        }">
                        </span>


                    <!-- category pill -->
                    <div class="absolute top-3 left-3
                        bg-white rounded-full shadow
                        px-3 py-1 text-xs font-medium dark:text-black">

                        <span th:text="${c.category}">
                        </span>
                    </div>
                </div>
                <!-- LOWER HALF -->
                <div class="p-4">
                    <h3 class="text-2xl leading-tight font-medium truncate dark:text-white"
                        th:text="${c.brand}">
                    </h3>

                    <p class="mt-2 text-lg text-gray-700 line-clamp-2 leading-snug dark:text-slate-300"
                       th:text="${c.description}">
                    </p>
                </div>
            </a>
        </div>
    </div>

</div>


<button id="themeToggle"
        onclick="toggleTheme()"
        class="fixed bottom-6 right-6 z-50
w-10 h-10 rounded-full
bg-slate-900 text-white
dark:bg-white dark:text-black
shadow-xl">

    🌙

</button>


<script>

    function toggleTheme(){

    document.documentElement
    .classList.toggle("dark");

    if(
    document.documentElement.classList.contains("dark")
    ){
    localStorage.theme="dark";
    document.getElementById(
    'themeToggle'
    ).innerHTML='☀';
    }
    else{
    localStorage.theme="light";
    document.getElementById(
    'themeToggle'
    ).innerHTML='🌙';
    }

    }

    if(localStorage.theme==="dark"){
    document.getElementById(
    'themeToggle'
    ).innerHTML='☀';
    }

</script>
</body>
</html>
