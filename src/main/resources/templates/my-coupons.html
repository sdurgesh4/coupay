<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Coupons</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
    <script>
        tailwind.config={
        darkMode:'class'
        }
    </script>

    <script>
        if(localStorage.theme==="dark"){
        document.documentElement
        .classList.add("dark");
        }
    </script>
</head>

<body class="bg-gray-100 bg-gray-100
      dark:bg-slate-950
      dark:text-white">

<div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="bg-green-100 p-6 rounded-b-3xl flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-bold dark:text-black">My Coupons</h2>
            <p class="text-gray-600">Used / Purchased</p>
        </div>

        <a href="/" class="btn blue rounded-full">Home</a>
    </div>

    <!-- Grid -->
    <div class="grid gap-4 p-4
                grid-cols-2
                md:grid-cols-3
                lg:grid-cols-4">

        <div th:each="c : ${coupons}"
             class="bg-white rounded-2xl p-4 shadow-md border border-green-300">

            <!-- QR -->
            <img th:src="${c.qrCodeUrl}"
                 class="h-24 mx-auto mb-3 object-contain"/>

            <!-- Brand -->
            <h3 class="font-semibold text-center"
                th:text="${c.brand}"></h3>

            <!-- Desc -->
            <p class="text-sm text-gray-500 text-center"
               th:text="${c.description}"></p>

            <!-- Used Badge -->
            <div class="mt-3 text-center">
                <span class="bg-green-500 text-white px-3 py-1 rounded-full text-xs">
                    Used
                </span>
            </div>

        </div>

    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(coupons)}"
         class="text-center mt-10 text-gray-500">

        <p>No used coupons yet</p>
        <a href="/" class="btn blue rounded-xl mt-3">Browse Coupons</a>

    </div>

</div>

</body>
</html>
