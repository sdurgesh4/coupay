<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reveal Coupon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={
            darkMode:'class'
        }
    </script>

    <script>
        if(localStorage.theme==="dark"){
            document.documentElement
                .classList.add("dark");
        }
    </script>
</head>

<body class="bg-gray-100
flex items-center justify-center
min-h-screen dark:bg-slate-800 dark:text-white dark:border-slate-600">

<div class="bg-white p-8 rounded-3xl shadow
text-center max-w-md">

    <h2 class="text-2xl font-bold mb-6">
        Coupon Unlocked
    </h2>

    <div class="text-3xl font-mono
            bg-green-50 p-4 rounded-2xl mb-5"
                     th:text="${coupon.couponCode}">
                </div>

    <button
            onclick="copyCode()"
            class="bg-gray-900 text-white px-5 py-3 rounded-full">
        Copy Code
    </button>

</div>

<script>
    function copyCode(){
        navigator.clipboard.writeText(
            '[[${coupon.couponCode}]]'
        );
        alert("Copied");
    }
</script>

</body>
</html>
